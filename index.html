<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELLER NOIR | Elite Inventory & OCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0A0A0A; color: #E0E0E0; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s ease; }
        .glass-card:hover { border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.04); }
        input, select { background: transparent !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important; color: inherit; }
        input:focus { border-bottom-color: #FFFFFF !important; outline: none; }
        /* Treure fletxes de control dels inputs number per estètica */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="cellerApp()" x-init="init()">

    <header class="p-8 border-b border-white/5 sticky top-0 z-50 bg-[#0A0A0A]/80 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-end">
            <div>
                <h1 class="text-[10px] tracking-[0.6em] uppercase opacity-40 mb-2 font-semibold">Sommelier Connect v1.3</h1>
                <p class="text-3xl font-extralight tracking-tighter italic text-white">Celler<span class="font-bold not-italic">Noir</span></p>
            </div>
            <div class="flex items-center gap-6">
                <button @click="showShare = true" class="p-2 opacity-40 hover:opacity-100 transition duration-300">
                    <i data-lucide="share" class="w-5 h-5"></i>
                </button>
                <button @click="showAdd = true" class="bg-white text-black px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:scale-105 transition-all shadow-lg shadow-white/10">
                    Nova Referència
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8 md:p-16">
        
        <template x-if="vins.length === 0">
            <div class="flex flex-col items-center justify-center py-40 border border-white/5 rounded-[50px] bg-gradient-to-b from-white/[0.02] to-transparent">
                <div class="p-8 bg-white/5 rounded-full mb-8">
                    <i data-lucide="scan-text" class="w-12 h-12 opacity-10"></i>
                </div>
                <h2 class="text-sm uppercase tracking-[0.5em] opacity-30 font-light text-center">Inventari buit<br><span class="text-[10px] lowercase italic tracking-normal">Carrega un albarà o afegeix vi manualment</span></h2>
            </div>
        </template>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <template x-for="(vi, index) in vins" :key="vi.id">
                <div class="glass-card rounded-[40px] p-10 flex flex-col justify-between overflow-hidden relative">
                    <div class="mb-10">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[9px] uppercase tracking-widest opacity-30 mb-1" x-text="vi.cellerNom || 'Productor'"></p>
                                <h3 class="text-2xl font-light leading-tight text-white italic" x-text="vi.nom"></h3>
                            </div>
                            <span class="text-xs font-mono opacity-30 bg-white/5 px-3 py-1 rounded-full" x-text="vi.anyada || 'NV'"></span>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <span class="text-[8px] uppercase tracking-widest bg-white/10 px-2 py-0.5 rounded font-bold" x-text="vi.tipus"></span>
                            <template x-if="vi.regio"><span class="text-[8px] uppercase tracking-widest opacity-40 border border-white/10 px-2 py-0.5 rounded" x-text="vi.regio"></span></template>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="flex justify-between items-center bg-white/[0.03] p-5 rounded-3xl">
                            <div>
                                <p class="text-[9px] uppercase tracking-[0.2em] opacity-30 mb-1 font-bold">Celler Central</p>
                                <input type="number" x-model.number="vi.estocCeller" class="text-3xl font-light w-20 border-none focus:border-none p-0 m-0">
                            </div>
                            <div class="flex flex-col gap-2">
                                <button @click="updateStock(index, 'celler', 1)" class="p-1 opacity-20 hover:opacity-100 transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                <button @click="updateStock(index, 'celler', -1)" class="p-1 opacity-20 hover:opacity-100 transition"><i data-lucide="minus" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="flex items-center justify-center gap-4 relative">
                            <div class="absolute w-full h-[1px] bg-white/5 z-0"></div>
                            <button @click="transfer(index, 'celler', 'nevera')" class="relative z-10 bg-[#0F0F0F] border border-white/10 px-5 py-2 rounded-full text-[9px] uppercase tracking-tighter flex items-center gap-2 hover:bg-white hover:text-black transition-all">
                                <i data-lucide="arrow-down" class="w-3 h-3"></i> Nevera
                            </button>
                            <button @click="transfer(index, 'nevera', 'celler')" class="relative z-10 bg-[#0F0F0F] border border-white/10 px-5 py-2 rounded-full text-[9px] uppercase tracking-tighter flex items-center gap-2 hover:bg-white hover:text-black transition-all">
                                <i data-lucide="arrow-up" class="w-3 h-3"></i> Celler
                            </button>
                        </div>

                        <div class="flex justify-between items-center border border-white/10 p-5 rounded-3xl bg-white/[0.01]">
                            <div>
                                <p class="text-[9px] uppercase tracking-[0.2em] opacity-80 mb-1 text-white font-bold italic">Nevera Servei</p>
                                <input type="number" x-model.number="vi.estocNevera" class="text-3xl font-bold text-white w-20 border-none focus:border-none p-0 m-0">
                            </div>
                            <div class="flex flex-col gap-2">
                                <button @click="updateStock(index, 'nevera', 1)" class="p-1 opacity-40 hover:opacity-100 text-white transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                <button @click="updateStock(index, 'nevera', -1)" class="p-1 opacity-40 hover:opacity-100 text-white transition"><i data-lucide="minus" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="showAdd" x-cloak class="fixed inset-0 z-[60] flex justify-end">
        <div @click="showAdd = false" class="absolute inset-0 bg-black/90 backdrop-blur-sm transition-opacity"></div>
        <div class="relative w-full max-w-xl bg-[#0F0F0F] h-full p-16 border-l border-white/10 shadow-2xl overflow-y-auto" x-transition:enter="transition transform duration-500" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-4xl font-light tracking-tighter italic text-white">Entrada de Vi</h2>
                <button @click="showAdd = false" class="opacity-20 hover:opacity-100"><i data-lucide="x" class="w-8 h-8"></i></button>
            </div>

            <div class="mb-12">
                <label class="group relative flex flex-col items-center justify-center border-2 border-dashed border-white/10 rounded-[30px] p-8 cursor-pointer hover:bg-white/[0.02] hover:border-white/30 transition-all overflow-hidden">
                    <div x-show="!isOcrLoading" class="flex flex-col items-center text-center">
                        <i data-lucide="camera" class="w-6 h-6 mb-4 opacity-40"></i>
                        <span class="text-[10px] uppercase tracking-[0.3em] font-bold">Llegir Albarà</span>
                    </div>
                    <div x-show="isOcrLoading" class="flex flex-col items-center text-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-white mb-4"></div>
                        <span class="text-[10px] uppercase tracking-[0.3em] italic">Processant...</span>
                    </div>
                    <input type="file" @change="processOcr($event)" class="hidden" accept="image/*">
                </label>
            </div>

            <div class="space-y-10" :class="isOcrLoading ? 'opacity-20 pointer-events-none' : ''">
                <div>
                    <label class="text-[10px] uppercase tracking-[0.3em] opacity-30 block mb-4 font-bold">Tipologia</label>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="t in tipusOptions">
                            <button @click="form.tipus = t" 
                                    :class="form.tipus === t ? 'bg-white text-black' : 'bg-white/5 text-white opacity-40'"
                                    class="text-[9px] uppercase px-4 py-2 rounded-full transition-all border border-white/10" 
                                    x-text="t"></button>
                        </template>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] uppercase tracking-[0.3em] opacity-30 block mb-2 font-bold">Celler / Productor *</label>
                    <input type="text" x-model="form.cellerNom" placeholder="Nom de la bodega" class="w-full py-2">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-[0.3em] opacity-30 block mb-2 font-bold">Nom del vi *</label>
                    <input type="text" x-model="form.nom" placeholder="Ex: Brunello di Montalcino" class="w-full text-2xl font-light py-2 italic">
                </div>
                
                <div class="grid grid-cols-2 gap-12">
                    <div>
                        <label class="text-[10px] uppercase tracking-[0.3em] opacity-30 block mb-2">Anyada</label>
                        <input type="text" x-model="form.anyada" placeholder="NV" class="w-full py-2">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-[0.3em] opacity-30 block mb-2">Regió / D.O.</label>
                        <input type="text" x-model="form.regio" placeholder="Toscana" class="w-full py-2">
                    </div>
                </div>

                <div class="bg-white/[0.02] p-8 rounded-[30px] border border-white/5">
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <label class="text-[10px] uppercase opacity-30 block mb-2 font-bold">Uts. Celler</label>
                            <input type="number" x-model.number="form.estocCeller" class="w-full py-2 text-xl font-mono">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase opacity-30 block mb-2 font-bold">Uts. Nevera</label>
                            <input type="number" x-model.number="form.estocNevera" class="w-full py-2 text-xl font-mono">
                        </div>
                    </div>
                </div>

                <button @click="addVi()" class="w-full bg-white text-black py-6 rounded-full font-bold uppercase text-xs tracking-[0.5em] hover:bg-gray-200 transition-all">
                    Guardar Referència
                </button>
            </div>
        </div>
    </div>

    <div x-show="showShare" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center p-6">
        <div @click="showShare = false" class="absolute inset-0 bg-black/95"></div>
        <div class="relative w-full max-w-lg bg-[#141414] rounded-[50px] p-12 border border-white/10 shadow-2xl">
            <h3 class="text-2xl font-light mb-10 italic text-white">Equip Sommelier</h3>
            <div class="space-y-6 mb-12">
                <input type="email" x-model="shareEmail" placeholder="correu@restaurant.com" class="w-full py-4 text-sm">
                <div class="flex gap-4">
                    <select x-model="shareRole" class="flex-1 py-4 text-[10px] uppercase font-bold tracking-widest cursor-pointer border-b border-white/10">
                        <option value="editor" class="bg-[#141414]">Editor</option>
                        <option value="lector" class="bg-[#141414]">Lector</option>
                    </select>
                    <button @click="addUser()" class="bg-white/10 hover:bg-white hover:text-black transition-all px-8 rounded-full text-[10px] font-bold uppercase tracking-widest">Afegir</button>
                </div>
            </div>
            <div class="space-y-4 max-h-48 overflow-y-auto pr-2">
                <template x-for="(user, i) in team" :key="i">
                    <div class="flex justify-between items-center p-5 bg-white/[0.02] rounded-3xl border border-white/5">
                        <span class="text-xs opacity-40 font-mono" x-text="user.email"></span>
                        <span class="text-[8px] uppercase tracking-widest px-3 py-1 rounded-full border border-white/20 font-bold" x-text="user.role"></span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function cellerApp() {
            return {
                showAdd: false,
                showShare: false,
                isOcrLoading: false,
                vins: [],
                team: [],
                shareEmail: '',
                shareRole: 'editor',
                tipusOptions: ['Blanc', 'Negre', 'Escumós', 'Dolç', 'Generós', 'De Licor'],
                form: { cellerNom: '', nom: '', anyada: '', regio: '', tipus: 'Blanc', estocCeller: 0, estocNevera: 0 },

                init() { lucide.createIcons(); },

                processOcr(event) {
                    if (!event.target.files[0]) return;
                    this.isOcrLoading = true;
                    setTimeout(() => {
                        this.form.cellerNom = "Domaine de la Romanée-Conti";
                        this.form.nom = "La Tâche Grand Cru";
                        this.form.anyada = "2018";
                        this.form.regio = "Borgonya, FR";
                        this.form.tipus = "Negre";
                        this.form.estocCeller = 12;
                        this.isOcrLoading = false;
                        this.refresh();
                    }, 2500);
                },

                addVi() {
                    if (!this.form.nom) return;
                    this.vins.push({
                        id: Date.now(),
                        cellerNom: this.form.cellerNom,
                        nom: this.form.nom,
                        anyada: this.form.anyada,
                        regio: this.form.regio,
                        tipus: this.form.tipus,
                        estocCeller: parseInt(this.form.estocCeller) || 0,
                        estocNevera: parseInt(this.form.estocNevera) || 0
                    });
                    this.form = { cellerNom: '', nom: '', anyada: '', regio: '', tipus: 'Blanc', estocCeller: 0, estocNevera: 0 };
                    this.showAdd = false;
                    this.refresh();
                },

                updateStock(index, type, val) {
                    if (type === 'celler') {
                        this.vins[index].estocCeller = Math.max(0, this.vins[index].estocCeller + val);
                    } else {
                        this.vins[index].estocNevera = Math.max(0, this.vins[index].estocNevera + val);
                    }
                },

                transfer(index, from, to) {
                    const fromKey = from === 'celler' ? 'estocCeller' : 'estocNevera';
                    const toKey = to === 'celler' ? 'estocCeller' : 'estocNevera';
                    if (this.vins[index][fromKey] > 0) {
                        this.vins[index][fromKey]--;
                        this.vins[index][toKey]++;
                    }
                },

                addUser() {
                    if (!this.shareEmail.includes('@')) return;
                    this.team.unshift({ email: this.shareEmail, role: this.shareRole });
                    this.shareEmail = '';
                    this.refresh();
                },

                refresh() { setTimeout(() => lucide.createIcons(), 50); }
            }
        }
    </script>
</body>
</html>
