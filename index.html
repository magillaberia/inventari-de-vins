<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELLER NOIR | Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #121212; /* Fons gris quasi negre */
            color: #E0E0E0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        input, select {
            background: transparent !important;
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="cellerManager()" x-init="init()">

    <header class="p-8 border-b border-white/5 bg-[#121212]/80 backdrop-blur sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-end">
            <div>
                <h1 class="text-xs tracking-[0.5em] uppercase opacity-40 mb-1">Michelin Standard</h1>
                <p class="text-2xl font-light tracking-tighter italic">Celler Noir</p>
            </div>
            <div class="flex gap-3">
                <button @click="showShare = true" class="p-2 hover:bg-white/5 rounded-full transition">
                    <i data-lucide="share-2" class="w-5 h-5 opacity-60"></i>
                </button>
                <button @click="showAdd = true" class="bg-white text-black px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-gray-200 transition">
                    Afegir Vi
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-8">
        
        <template x-if="vins.length === 0">
            <div class="flex flex-col items-center justify-center py-32 border-2 border-dashed border-white/5 rounded-3xl">
                <div class="bg-white/5 p-6 rounded-full mb-6">
                    <i data-lucide="database" class="w-10 h-10 opacity-20"></i>
                </div>
                <p class="text-sm uppercase tracking-widest opacity-30">Inventari buit</p>
                <button @click="showAdd = true" class="mt-4 text-xs underline opacity-60 hover:opacity-100 transition">Crea la primera referència</button>
            </div>
        </template>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="(vi, index) in vins" :key="vi.id">
                <div class="glass-card rounded-2xl p-6 hover:border-white/20 transition-all duration-500 group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="max-w-[70%]">
                            <h3 class="text-lg font-light leading-tight group-hover:text-white transition" x-text="vi.nom"></h3>
                            <p class="text-[10px] uppercase tracking-widest opacity-40 mt-1" x-text="vi.regio || 'Sense regió'"></p>
                        </div>
                        <span class="font-mono text-sm opacity-30" x-text="vi.anyada || 'NV'"></span>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                            <span class="text-[10px] uppercase tracking-widest opacity-50 font-semibold">Stock Celler</span>
                            <div class="flex items-center gap-4">
                                <button @click="updateStock(index, 'celler', -1)" class="opacity-30 hover:opacity-100 transition"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                <span class="w-8 text-center font-mono text-xl" x-text="vi.estocCeller"></span>
                                <button @click="updateStock(index, 'celler', 1)" class="opacity-30 hover:opacity-100 transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div class="flex justify-between items-center border border-white/10 p-4 rounded-xl">
                            <span class="text-[10px] uppercase tracking-widest opacity-80 font-bold">Nevera Servei</span>
                            <div class="flex items-center gap-4">
                                <button @click="updateStock(index, 'nevera', -1)" class="opacity-30 hover:opacity-100 transition"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                                <span class="w-8 text-center font-mono text-xl font-bold text-white" x-text="vi.estocNevera"></span>
                                <button @click="updateStock(index, 'nevera', 1)" class="opacity-30 hover:opacity-100 transition"><i data-lucide="chevron-up" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="showAdd" x-cloak class="fixed inset-0 z-50 flex justify-end">
        <div @click="showAdd = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-lg bg-[#181818] h-full p-10 border-l border-white/10 shadow-2xl overflow-y-auto" x-transition:enter="transition transform duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            <h2 class="text-3xl font-light mb-10 tracking-tighter">Nova Referència</h2>
            
            <div class="space-y-8">
                <div>
                    <label class="text-[10px] uppercase tracking-[0.2em] opacity-30 block mb-2">Nom del vi</label>
                    <input type="text" x-model="form.nom" class="w-full border-b border-white/10 pb-2 outline-none focus:border-white transition italic text-lg">
                </div>
                <div class="grid grid-cols-2 gap-8">
                    <div>
                        <label class="text-[10px] uppercase tracking-[0.2em] opacity-30 block mb-2">Anyada</label>
                        <input type="text" x-model="form.anyada" placeholder="2020" class="w-full border-b border-white/10 pb-2 outline-none focus:border-white transition">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-[0.2em] opacity-30 block mb-2">D.O. / Regió</label>
                        <input type="text" x-model="form.regio" class="w-full border-b border-white/10 pb-2 outline-none focus:border-white transition">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-[0.2em] opacity-30 block mb-2">Detalls Opcionals (Raïm, Productor...)</label>
                    <input type="text" x-model="form.detalls" class="w-full border-b border-white/10 pb-2 outline-none focus:border-white transition">
                </div>
                
                <div class="pt-10">
                    <button @click="addVi()" class="w-full bg-white text-black py-4 rounded-xl font-bold uppercase text-[10px] tracking-[0.3em] hover:bg-gray-200 transition">
                        Confirmar Entrada
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showShare" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-6">
        <div @click="showShare = false" class="absolute inset-0 bg-black/80"></div>
        <div class="relative w-full max-w-md bg-[#1c1c1c] rounded-3xl p-8 border border-white/10 shadow-2xl">
            <h3 class="text-xl font-light mb-6 tracking-tight italic">Gestionar Col·laboradors</h3>
            
            <div class="space-y-4 mb-8">
                <div class="flex gap-2">
                    <input type="email" x-model="shareEmail" placeholder="correu@restaurant.com" class="flex-1 border border-white/10 rounded-lg px-4 py-2 text-sm">
                    <select x-model="shareRole" class="border border-white/10 rounded-lg text-[10px] uppercase bg-transparent px-2">
                        <option value="editor" class="bg-[#1c1c1c]">Editor</option>
                        <option value="lector" class="bg-[#1c1c1c]">Lector</option>
                    </select>
                </div>
                <button @click="addUser()" class="w-full bg-white/5 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition">Convidar</button>
            </div>

            <div class="space-y-3">
                <template x-for="(user, i) in team" :key="i">
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                        <span class="text-xs opacity-60" x-text="user.email"></span>
                        <span class="text-[8px] uppercase tracking-tighter px-2 py-1 rounded bg-white/10" x-text="user.role"></span>
                    </div>
                </template>
            </div>

            <div class="mt-8 pt-6 border-t border-white/5">
                <button @click="copyLink()" class="flex items-center gap-2 text-[10px] uppercase tracking-widest opacity-40 hover:opacity-100 transition mx-auto">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copiar enllaç d'accés
                </button>
            </div>
        </div>
    </div>

    <script>
        function cellerManager() {
            return {
                showAdd: false,
                showShare: false,
                vins: [],
                team: [],
                shareEmail: '',
                shareRole: 'editor',
                form: { nom: '', anyada: '', regio: '', detalls: '', estocCeller: 0, estocNevera: 0 },

                init() {
                    lucide.createIcons();
                },

                addVi() {
                    if (!this.form.nom) return;
                    this.vins.push({
                        id: Date.now(),
                        ...this.form,
                        estocCeller: 0,
                        estocNevera: 0
                    });
                    this.form = { nom: '', anyada: '', regio: '', detalls: '', estocCeller: 0, estocNevera: 0 };
                    this.showAdd = false;
                    this.refreshIcons();
                },

                updateStock(index, type, val) {
                    if (type === 'celler') {
                        this.vins[index].estocCeller = Math.max(0, this.vins[index].estocCeller + val);
                    } else {
                        this.vins[index].estocNevera = Math.max(0, this.vins[index].estocNevera + val);
                    }
                },

                addUser() {
                    if (!this.shareEmail.includes('@')) return;
                    this.team.push({ email: this.shareEmail, role: this.shareRole });
                    this.shareEmail = '';
                },

                copyLink() {
                    navigator.clipboard.writeText(window.location.href);
                    alert("Enllaç de compartició copiat.");
                },

                refreshIcons() {
                    setTimeout(() => lucide.createIcons(), 50);
                }
            }
        }
    </script>
</body>
</html>
